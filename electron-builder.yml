appId: dev.netalk.app.tenjo
productName: Tenjo
copyright: "Copyright © 2026 netalkGB"

asar: false

protocols:
  - name: Tenjo
    schemes:
      - dev.netalk.app.tenjo

files:
  - main.js
  - preload.js
  - "tenjo/**/*"
  - "!tenjo/.git"
  - "!tenjo/client/src/**"
  - "!tenjo/client/node_modules/**"
  - "!tenjo/server/src/**"
  - "!tenjo/server/tests/**"

mac:
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - dmg
    - zip

win:
  target:
    - nsis
    - portable

linux:
  target:
    - AppImage
    - deb
